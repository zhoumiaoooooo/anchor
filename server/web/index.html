<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>锚点</title>
<style>
*,*::before,*::after{box-sizing:border-box}
*{margin:0}
:root{
  --bg:#f6f3ee;
  --panel:#fffdfa;
  --panel-2:#f0eee8;
  --ink:#24231f;
  --muted:#6f6a60;
  --soft:#9b9386;
  --line:#ded8ce;
  --line-strong:#c9c0b4;
  --accent:#9f7a4f;
  --accent-2:#506f73;
  --sage:#7d8b73;
  --danger:#9a5548;
  --shadow:0 18px 45px rgba(50,42,31,.08);
  --shadow-sm:0 8px 22px rgba(50,42,31,.07);
  --radius:8px;
  --font-sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",Arial,sans-serif;
  --font-serif:"Songti SC","Noto Serif SC","Source Han Serif SC",Georgia,serif;
}
html{font-size:16px}
body{
  min-height:100vh;
  color:var(--ink);
  background:
    linear-gradient(90deg,rgba(36,35,31,.035) 1px,transparent 1px) 0 0/56px 56px,
    linear-gradient(rgba(36,35,31,.03) 1px,transparent 1px) 0 0/56px 56px,
    radial-gradient(circle at 82% 12%,rgba(80,111,115,.12),transparent 30rem),
    var(--bg);
  font-family:var(--font-sans);
  line-height:1.68;
  -webkit-font-smoothing:antialiased;
}
button,input,textarea{font:inherit;color:inherit}
button{border:0;background:none;cursor:pointer}
button:disabled{cursor:not-allowed;opacity:.48}
input,textarea{width:100%;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(159,122,79,.12)}
input::placeholder,textarea::placeholder{color:var(--soft)}
.hidden{display:none!important}
.serif{font-family:var(--font-serif)}
.view{animation:viewIn .36s ease both}
@keyframes viewIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.45rem;
  min-height:42px;padding:.68rem 1.05rem;border-radius:999px;
  border:1px solid var(--line);background:var(--panel);color:var(--ink);
  font-size:.92rem;letter-spacing:.02em;transition:transform .2s,border-color .2s,background .2s,box-shadow .2s;
}
.btn:hover:not(:disabled){transform:translateY(-1px);border-color:var(--line-strong);box-shadow:var(--shadow-sm)}
.btn-primary{background:var(--ink);border-color:var(--ink);color:#fff}
.btn-primary:hover:not(:disabled){background:#111}
.btn-accent{background:var(--accent-2);border-color:var(--accent-2);color:#fff}
.btn-text{border-color:transparent;background:transparent;color:var(--muted);padding-inline:.55rem}
.btn-text:hover:not(:disabled){box-shadow:none;color:var(--ink);border-color:transparent}
.icon-btn{
  width:40px;height:40px;border-radius:999px;border:1px solid var(--line);
  background:var(--panel);display:inline-flex;align-items:center;justify-content:center;
}
.kicker{font-size:.76rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700}
.muted{color:var(--muted)}

.cover{
  min-height:100vh;display:grid;grid-template-columns:minmax(0,1fr) minmax(300px,420px);
  gap:4rem;align-items:center;max-width:1180px;margin:0 auto;padding:4rem clamp(1.25rem,5vw,4rem);
}
.cover-stage{position:relative;min-height:560px;display:flex;align-items:center}
.atlas{
  position:absolute;inset:0;border:1px solid rgba(36,35,31,.1);background:rgba(255,253,250,.52);
  box-shadow:var(--shadow);overflow:hidden;
}
.atlas::before{
  content:"";position:absolute;inset:2rem;
  background:
    linear-gradient(90deg,rgba(159,122,79,.18) 1px,transparent 1px) 0 0/84px 84px,
    linear-gradient(rgba(159,122,79,.14) 1px,transparent 1px) 0 0/84px 84px;
  mask-image:linear-gradient(120deg,#000,transparent 75%);
}
.atlas-line{position:absolute;height:1px;background:rgba(36,35,31,.18);transform-origin:left center}
.atlas-line.l1{width:62%;left:18%;top:31%;transform:rotate(-12deg)}
.atlas-line.l2{width:48%;left:35%;top:58%;transform:rotate(16deg)}
.atlas-line.l3{width:36%;left:11%;top:72%;transform:rotate(-4deg)}
.pin{
  position:absolute;width:13px;height:13px;border:2px solid var(--accent-2);border-radius:50%;
  background:var(--panel);box-shadow:0 0 0 8px rgba(80,111,115,.08);
}
.pin.p1{left:20%;top:29%}.pin.p2{left:54%;top:23%}.pin.p3{left:69%;top:54%}.pin.p4{left:29%;top:70%}
.archive-slip{
  position:relative;width:min(520px,88%);margin-left:8%;padding:2.2rem;background:rgba(255,253,250,.9);
  border:1px solid var(--line);box-shadow:var(--shadow);
}
.archive-slip::before{content:"ANCHOR / PRIVATE MEMORY INDEX";display:block;margin-bottom:2rem;color:var(--soft);font-size:.72rem;letter-spacing:.16em}
.cover-title{font-family:var(--font-serif);font-size:clamp(4.4rem,11vw,8.5rem);font-weight:400;letter-spacing:.18em;line-height:.95}
.cover-sub{margin-top:2rem;max-width:29rem;font-size:1.28rem;line-height:2;color:var(--muted)}
.cover-actions{margin-top:2.4rem;display:flex;gap:.75rem;flex-wrap:wrap}
.cover-side{align-self:end;padding-bottom:2rem}
.cover-note{border-top:1px solid var(--line);padding-top:1.6rem;color:var(--muted);line-height:2;font-size:.95rem}
.cover-next{margin-top:3rem;border-left:2px solid var(--accent);padding-left:1rem;color:var(--ink)}

.full{
  min-height:100vh;display:flex;align-items:center;max-width:880px;margin:0 auto;
  padding:4rem clamp(1.25rem,6vw,4rem);
}
.onboard{width:100%}
.onboard-title{font-family:var(--font-serif);font-weight:400;font-size:clamp(2rem,5vw,3.4rem);line-height:1.35;letter-spacing:.04em}
.name-input{margin-top:2.4rem;max-width:620px;border:0;border-bottom:2px solid var(--line-strong);border-radius:0;background:transparent;padding:.65rem 0;font-family:var(--font-serif);font-size:clamp(2rem,6vw,4rem);letter-spacing:.05em}
.name-input:focus{box-shadow:none;border-bottom-color:var(--accent)}
.onboard-actions{margin-top:2rem;min-height:48px}
.rel-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:.75rem;max-width:620px;margin-top:2rem}
.rel-btn{
  min-height:58px;border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,253,250,.74);
  transition:transform .2s,border-color .2s,background .2s;letter-spacing:.04em;
}
.rel-btn:hover{transform:translateY(-1px);border-color:var(--accent)}
.rel-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}

.app{display:grid;grid-template-columns:280px minmax(0,1fr);min-height:100vh}
.rail{
  position:sticky;top:0;height:100vh;padding:1.5rem;border-right:1px solid var(--line);
  background:rgba(255,253,250,.74);backdrop-filter:blur(18px);display:flex;flex-direction:column;gap:1.4rem;
}
.identity{padding:1rem;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel)}
.identity-name{font-family:var(--font-serif);font-size:1.65rem;line-height:1.2;font-weight:400}
.identity-rel{margin-top:.35rem;color:var(--muted);font-size:.86rem}
.progress-ring{display:grid;grid-template-columns:auto 1fr;gap:.75rem;align-items:center;margin-top:1rem}
.ring{
  width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-size:.78rem;
  background:conic-gradient(var(--accent-2) var(--p),var(--panel-2) 0);
}
.ring span{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:var(--panel)}
.nav-list{display:grid;gap:.35rem}
.nav-item{
  width:100%;display:flex;align-items:center;gap:.7rem;padding:.72rem .8rem;border-radius:var(--radius);
  color:var(--muted);text-align:left;transition:background .2s,color .2s;
}
.nav-item:hover,.nav-item.active{background:var(--panel-2);color:var(--ink)}
.nav-dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--line-strong)}
.nav-dot.done{background:var(--accent-2);border-color:var(--accent-2)}
.rail-bottom{margin-top:auto;display:grid;gap:.3rem}
.mobile-top{display:none}
.main{padding:clamp(1.2rem,4vw,3rem);max-width:1120px;width:100%}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;margin-bottom:1.4rem}
.page-title{font-family:var(--font-serif);font-size:clamp(1.8rem,4vw,3rem);font-weight:400;line-height:1.2}
.page-sub{margin-top:.5rem;color:var(--muted);max-width:42rem}

.home-grid{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(280px,.8fr);gap:1rem;align-items:start}
.hero-panel{
  padding:2rem;border:1px solid var(--line);background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow-sm);
}
.hero-line{font-family:var(--font-serif);font-size:clamp(1.8rem,4vw,3.2rem);line-height:1.32;font-weight:400;max-width:13em}
.hero-actions{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:1.8rem}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin-top:1rem}
.stat{padding:1rem;border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,253,250,.72)}
.stat b{display:block;font-family:var(--font-serif);font-size:1.7rem;font-weight:400}.stat span{font-size:.78rem;color:var(--muted)}
.memory-preview,.side-panel{border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,253,250,.86);padding:1.2rem}
.quote{font-family:var(--font-serif);font-size:1.1rem;line-height:1.95;margin-top:.7rem}
.meta{display:flex;gap:.55rem;flex-wrap:wrap;margin-top:.9rem;color:var(--soft);font-size:.78rem}
.tag{display:inline-flex;align-items:center;min-height:24px;border:1px solid var(--line);border-radius:999px;padding:0 .55rem;background:rgba(255,253,250,.72)}

.chapter-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:.9rem}
.chapter-card{
  grid-column:span 2;min-height:216px;padding:1.15rem;border:1px solid var(--line);border-radius:var(--radius);
  background:var(--panel);display:flex;flex-direction:column;transition:transform .2s,border-color .2s,box-shadow .2s;
}
.chapter-card:nth-child(4),.chapter-card:nth-child(5){grid-column:span 3}
.chapter-card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--shadow-sm)}
.chapter-card.done{background:linear-gradient(180deg,#fffdfa,#f2f4f1);border-color:rgba(80,111,115,.35)}
.chapter-num{font-size:.74rem;letter-spacing:.15em;color:var(--accent)}
.chapter-title{font-family:var(--font-serif);font-size:1.85rem;font-weight:400;margin-top:.65rem}
.chapter-desc{color:var(--muted);font-size:.92rem;margin-top:.45rem}
.chapter-foot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;color:var(--soft);font-size:.82rem}

.chat-shell{height:calc(100vh - 6rem);min-height:620px;display:grid;grid-template-columns:minmax(0,1fr) 260px;gap:1rem}
.chat-panel{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);display:flex;flex-direction:column;min-width:0;overflow:hidden}
.chat-bar{display:flex;justify-content:space-between;gap:1rem;align-items:center;padding:1rem 1.1rem;border-bottom:1px solid var(--line);background:rgba(255,253,250,.9)}
.chat-title{font-family:var(--font-serif);font-size:1.35rem}
.chat-log{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.8rem;background:linear-gradient(180deg,rgba(246,243,238,.46),transparent)}
.bubble{max-width:min(74%,620px);padding:.78rem .95rem;border-radius:var(--radius);line-height:1.8;animation:bubbleIn .22s ease both;white-space:pre-wrap}
@keyframes bubbleIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.bubble.ai{align-self:flex-start;background:var(--panel-2);border-bottom-left-radius:2px}
.bubble.user{align-self:flex-end;background:var(--ink);color:#fff;border-bottom-right-radius:2px}
.bubble.danger{background:#f6ece8;color:var(--danger)}
.typing{letter-spacing:.18em;color:var(--soft)}
.composer{display:grid;grid-template-columns:1fr auto;gap:.7rem;padding:1rem;border-top:1px solid var(--line)}
.composer textarea{min-height:46px;max-height:140px;resize:none;padding:.7rem .85rem}
.notes-panel{display:flex;flex-direction:column;gap:.9rem}
.notes-card{border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,253,250,.78);padding:1rem}
.note-list{list-style:none;padding:0;margin-top:.8rem;display:grid;gap:.5rem;color:var(--muted);font-size:.86rem}
.note-list li{padding-left:.75rem;border-left:2px solid var(--line)}

.toolbar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.filter{border:1px solid var(--line);border-radius:999px;padding:.42rem .75rem;background:var(--panel);font-size:.86rem;color:var(--muted)}
.filter.active{background:var(--ink);border-color:var(--ink);color:#fff}
.memory-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.9rem}
.memory-card{
  padding:1rem;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);
  cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;
}
.memory-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:var(--shadow-sm)}
.memory-text{font-family:var(--font-serif);line-height:1.95;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.empty{padding:2rem;border:1px dashed var(--line-strong);border-radius:var(--radius);color:var(--muted);background:rgba(255,253,250,.45)}
.overlay{position:fixed;inset:0;z-index:20;background:rgba(25,23,20,.42);display:grid;place-items:center;padding:1rem}
.detail{width:min(620px,100%);max-height:84vh;overflow:auto;background:var(--panel);border-radius:var(--radius);padding:1.4rem;border:1px solid var(--line);box-shadow:var(--shadow)}
.toast{position:fixed;left:50%;bottom:1.2rem;transform:translateX(-50%);z-index:30;max-width:min(560px,calc(100vw - 2rem));padding:.8rem 1rem;border-radius:999px;background:var(--ink);color:#fff;box-shadow:var(--shadow);font-size:.9rem}

@media(max-width:900px){
  .cover{grid-template-columns:1fr;gap:1.5rem}.cover-stage{min-height:440px}.cover-side{align-self:auto;padding-bottom:0}
  .app{display:block}.rail{display:none}.mobile-top{display:flex;position:sticky;top:0;z-index:10;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--line);background:rgba(255,253,250,.9);backdrop-filter:blur(16px)}
  .main{padding:1rem}.home-grid,.chat-shell{grid-template-columns:1fr}.chat-shell{height:auto;min-height:0}.chat-panel{min-height:70vh}.notes-panel{display:none}
  .memory-list{grid-template-columns:1fr}.chapter-grid{grid-template-columns:1fr}.chapter-card,.chapter-card:nth-child(4),.chapter-card:nth-child(5){grid-column:auto;min-height:170px}
}
@media(max-width:560px){
  .cover{padding:2.5rem 1rem}.cover-stage{min-height:390px}.archive-slip{margin:0;width:100%;padding:1.45rem}.cover-title{font-size:3.4rem}.cover-sub{font-size:1.05rem}
  .rel-grid{grid-template-columns:repeat(2,1fr)}.stat-row{grid-template-columns:1fr}.bubble{max-width:92%}
}
</style>
</head>
<body>
<div id="toast" class="toast hidden"></div>

<section id="cover" class="cover view">
  <div class="cover-stage" aria-hidden="true">
    <div class="atlas">
      <span class="atlas-line l1"></span><span class="atlas-line l2"></span><span class="atlas-line l3"></span>
      <span class="pin p1"></span><span class="pin p2"></span><span class="pin p3"></span><span class="pin p4"></span>
    </div>
    <div class="archive-slip">
      <h1 class="cover-title">锚点</h1>
      <p class="cover-sub">为一个重要的人，留下不会散掉的记忆。</p>
      <div class="cover-actions">
        <button class="btn btn-primary" data-action="start">开始记录</button>
        <button class="btn" data-action="restore">打开上次</button>
      </div>
    </div>
  </div>
  <aside class="cover-side">
    <p class="kicker">Private archive</p>
    <p class="cover-note">AI 只负责提问和整理。说出的每一句话，都来自你。这里不替代陪伴，也不制造告别，只帮你把那些细小、真实、容易散掉的东西放好。</p>
    <p class="cover-next">记录不是为了告别，而是为了证明我们爱过。</p>
  </aside>
</section>

<section id="namePage" class="full hidden view">
  <div class="onboard">
    <p class="kicker">Step 01</p>
    <h2 class="onboard-title">先告诉我，今天想记录谁。</h2>
    <input id="nameInput" class="name-input" placeholder="ta 的名字" autocomplete="off">
    <div class="onboard-actions">
      <button id="nameNext" class="btn btn-primary hidden" data-action="go-rel">继续</button>
    </div>
  </div>
</section>

<section id="relPage" class="full hidden view">
  <div class="onboard">
    <p class="kicker">Step 02</p>
    <h2 id="relTitle" class="onboard-title">ta 是你的什么人？</h2>
    <div id="relGrid" class="rel-grid"></div>
    <div class="onboard-actions">
      <button id="relNext" class="btn btn-primary hidden" data-action="create-subject">好了，开始吧</button>
    </div>
  </div>
</section>

<div id="app" class="app hidden">
  <header class="mobile-top">
    <div>
      <div id="mobileName" class="identity-name"></div>
      <div id="mobileRel" class="identity-rel"></div>
    </div>
    <button class="icon-btn" data-action="home" aria-label="回到首页">⌂</button>
  </header>

  <aside class="rail">
    <section class="identity">
      <h2 id="subjectName" class="identity-name"></h2>
      <p id="subjectRel" class="identity-rel"></p>
      <div class="progress-ring">
        <div id="progressRing" class="ring" style="--p:0%"><span>0/5</span></div>
        <p class="muted" id="progressText">还没有开始</p>
      </div>
    </section>
    <nav class="nav-list" id="chapterNav"></nav>
    <div class="rail-bottom">
      <button class="nav-item" data-action="home"><span class="nav-dot"></span>总览</button>
      <button class="nav-item" data-action="doors"><span class="nav-dot"></span>五个章节</button>
      <button class="nav-item" data-action="memories"><span class="nav-dot"></span>记忆库</button>
      <button class="nav-item" data-action="reset"><span class="nav-dot"></span>重新开始</button>
    </div>
  </aside>

  <main class="main">
    <section id="homeView" class="view"></section>
    <section id="doorsView" class="view hidden"></section>
    <section id="chatView" class="view hidden"></section>
    <section id="memoriesView" class="view hidden"></section>
  </main>
</div>

<script>
const CHAPTERS=[
  {key:'手',title:'手',num:'01',tone:'触感',desc:'大小、动作、茧、温度，以及 ta 用手做过的事。'},
  {key:'声音',title:'声音',num:'02',tone:'听觉',desc:'ta 叫你名字的方式、笑声、方言、歌声。'},
  {key:'地方',title:'地方',num:'03',tone:'空间',desc:'ta 长大的地方，住过的地方，最像自己的地方。'},
  {key:'那一天',title:'那一天',num:'04',tone:'时间',desc:'一个大的日子，或一个普通但一直记得的下午。'},
  {key:'还有件事',title:'还有件事',num:'05',tone:'未说出口',desc:'只写一条。不会自动发出去，只是存好。'}
];
const RELS=['妈妈','爸爸','外婆','外公','奶奶','爷爷','爱人','朋友','老师','同事','孩子','其他'];
const S={subject:null,subjectName:'',relationship:'',progress:null,memories:[],activeChapter:null,sessionId:null,loading:false,recorded:[],filter:'全部'};
const $=sel=>document.querySelector(sel);
const els={
  cover:$('#cover'),namePage:$('#namePage'),relPage:$('#relPage'),app:$('#app'),
  nameInput:$('#nameInput'),nameNext:$('#nameNext'),relTitle:$('#relTitle'),relGrid:$('#relGrid'),relNext:$('#relNext'),
  subjectName:$('#subjectName'),subjectRel:$('#subjectRel'),mobileName:$('#mobileName'),mobileRel:$('#mobileRel'),
  progressRing:$('#progressRing'),progressText:$('#progressText'),chapterNav:$('#chapterNav'),
  homeView:$('#homeView'),doorsView:$('#doorsView'),chatView:$('#chatView'),memoriesView:$('#memoriesView'),toast:$('#toast')
};

function api(path,opts={}){
  return fetch('/api/v1'+path,{headers:{'Content-Type':'application/json'},...opts})
    .then(async r=>{
      const data=await r.json().catch(()=>({}));
      if(!r.ok)throw new Error(data.error||'请求失败');
      return data;
    });
}
function esc(s=''){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(msg){els.toast.textContent=msg;els.toast.classList.remove('hidden');clearTimeout(toast.t);toast.t=setTimeout(()=>els.toast.classList.add('hidden'),2600)}
function showFull(id){[els.cover,els.namePage,els.relPage].forEach(x=>x.classList.add('hidden'));els.app.classList.add('hidden');els[id].classList.remove('hidden')}
function showApp(id){[els.cover,els.namePage,els.relPage].forEach(x=>x.classList.add('hidden'));els.app.classList.remove('hidden');['homeView','doorsView','chatView','memoriesView'].forEach(v=>els[v].classList.add('hidden'));els[id].classList.remove('hidden')}
function chapterDef(key){return CHAPTERS.find(c=>c.key===key)||CHAPTERS[0]}
function statusOf(key){const c=S.progress?.chapters?.find(x=>x.chapter===key);return c?.status||'available'}
function doneCount(){return S.progress?.chapters?.filter(c=>c.status==='completed').length||0}
function latestMemory(){return S.memories?.[0]}

function renderRelGrid(){
  els.relGrid.innerHTML=RELS.map(r=>`<button class="rel-btn ${S.relationship===r?'active':''}" data-rel="${r}">${r}</button>`).join('');
}
function renderShell(){
  if(!S.subject)return;
  const done=doneCount();
  els.subjectName.textContent=S.subject.name;
  els.subjectRel.textContent='我的'+S.subject.relationship;
  els.mobileName.textContent=S.subject.name;
  els.mobileRel.textContent='我的'+S.subject.relationship;
  els.progressRing.style.setProperty('--p',(done*20)+'%');
  els.progressRing.querySelector('span').textContent=done+'/5';
  els.progressText.textContent=done===0?'还没有开始':done===5?'五章都完成了':'已完成 '+done+' 个章节';
  els.chapterNav.innerHTML=CHAPTERS.map(ch=>{
    const done=statusOf(ch.key)==='completed';
    return `<button class="nav-item" data-chapter="${ch.key}"><span class="nav-dot ${done?'done':''}"></span>${ch.num} ${ch.title}</button>`;
  }).join('');
}
function renderHome(){
  const done=doneCount(), latest=latestMemory();
  els.homeView.innerHTML=`
    <div class="section-head">
      <div><p class="kicker">Overview</p><h1 class="page-title">${esc(S.subject.name)} 的记忆档案</h1><p class="page-sub">从任何一章开始都可以。重要的不是顺序，是那些只有你知道的细节。</p></div>
    </div>
    <div class="home-grid">
      <section class="hero-panel">
        <h2 class="hero-line">${done===0?'先推开一扇门。':done===5?'这份档案已经有了完整的轮廓。':'继续把散落的片段放好。'}</h2>
        <div class="hero-actions">
          <button class="btn btn-primary" data-action="doors">${done===0?'开始记录':'继续记录'}</button>
          <button class="btn" data-action="memories">查看记忆库</button>
        </div>
        <div class="stat-row">
          <div class="stat"><b>${done}</b><span>完成章节</span></div>
          <div class="stat"><b>${S.memories.length}</b><span>记忆片段</span></div>
          <div class="stat"><b>${Math.max(0,5-done)}</b><span>待打开</span></div>
        </div>
      </section>
      <aside class="side-panel">
        <p class="kicker">Recent</p>
        ${latest?`
          <div class="quote">${esc(short(latest.raw_text,150))}</div>
          <div class="meta"><span class="tag">${esc(latest.chapter)}</span><span class="tag">锚定潜力 ${latest.anchor_potential}/10</span></div>
        `:`<p class="muted" style="margin-top:.8rem">还没有片段。完成一个章节后，这里会出现最近留下的一句话。</p>`}
      </aside>
    </div>`;
  showApp('homeView');
}
function renderDoors(){
  els.doorsView.innerHTML=`
    <div class="section-head">
      <div><p class="kicker">Chapters</p><h1 class="page-title">五个章节</h1><p class="page-sub">每一章都只抓一个具体方向。你可以按任何顺序进入。</p></div>
    </div>
    <div class="chapter-grid">
      ${CHAPTERS.map(ch=>{
        const s=statusOf(ch.key), done=s==='completed';
        return `<button class="chapter-card ${done?'done':''}" data-chapter="${ch.key}">
          <span class="chapter-num">${ch.num} / ${ch.tone}</span>
          <strong class="chapter-title">${ch.title}</strong>
          <span class="chapter-desc">${ch.desc}</span>
          <span class="chapter-foot"><span>${done?'已完成':'可进入'}</span><span>${done?'存好':'打开'} →</span></span>
        </button>`;
      }).join('')}
    </div>`;
  showApp('doorsView');
}
function renderChat(){
  const ch=chapterDef(S.activeChapter);
  els.chatView.innerHTML=`
    <div class="chat-shell">
      <section class="chat-panel">
        <div class="chat-bar">
          <div><p class="kicker">${ch.num} / ${ch.tone}</p><div class="chat-title">关于${ch.title}</div></div>
          <div><button class="btn btn-text" data-action="doors">返回</button><button id="finishBtn" class="btn btn-accent" data-action="finish">完成本章</button></div>
        </div>
        <div id="chatLog" class="chat-log"></div>
        <div class="composer">
          <textarea id="chatInput" placeholder="写下你想起来的细节..." rows="1"></textarea>
          <button id="sendBtn" class="btn btn-primary" data-action="send">发送</button>
        </div>
      </section>
      <aside class="notes-panel">
        <div class="notes-card"><p class="kicker">Prompt</p><p class="muted" style="margin-top:.6rem">${ch.desc}</p></div>
        <div class="notes-card"><p class="kicker">Recorded</p><ul id="recordedList" class="note-list"></ul></div>
      </aside>
    </div>`;
  showApp('chatView');
}
function renderMemories(){
  const filters=['全部',...CHAPTERS.map(c=>c.key)];
  const list=S.filter==='全部'?S.memories:S.memories.filter(m=>m.chapter===S.filter);
  els.memoriesView.innerHTML=`
    <div class="section-head">
      <div><p class="kicker">Library</p><h1 class="page-title">记忆库</h1><p class="page-sub">这些都来自你说过的话。点开可以看完整内容。</p></div>
    </div>
    <div class="toolbar">${filters.map(f=>`<button class="filter ${S.filter===f?'active':''}" data-filter="${f}">${f}</button>`).join('')}</div>
    ${list.length?`<div class="memory-list">${list.map((m,i)=>memoryCard(m,i)).join('')}</div>`:`<div class="empty">还没有这一类记忆。先完成一个章节，它会自动整理到这里。</div>`}`;
  showApp('memoriesView');
}
function memoryCard(m,i){
  return `<article class="memory-card" data-memory="${i}">
    <div class="meta" style="margin-top:0;margin-bottom:.7rem"><span class="tag">${esc(m.chapter)}</span><span class="tag">潜力 ${m.anchor_potential}/10</span></div>
    <p class="memory-text">${esc(m.raw_text)}</p>
  </article>`;
}
function short(s,n){return s&&s.length>n?s.slice(0,n)+'...':s||''}

async function loadApp(){
  try{S.progress=await api('/subjects/'+S.subject.id+'/interviews/progress')}catch(e){S.progress={chapters:CHAPTERS.map(c=>({chapter:c.key,status:'available'}))};toast(e.message)}
  try{S.memories=await api('/subjects/'+S.subject.id+'/memories')}catch(e){S.memories=[]}
  renderShell();renderHome();
}
async function restoreLastSubject(){
  const saved=localStorage.getItem('anchor_subject');
  if(saved){
    try{
      S.subject=JSON.parse(saved);
      await loadApp();
      return;
    }catch(e){
      localStorage.removeItem('anchor_subject');
    }
  }

  const subjects=await api('/subjects');
  if(!subjects.length){
    toast('还没有上次记录');
    return;
  }
  const latest=subjects[0];
  S.subject={id:latest.id,name:latest.name,relationship:latest.relationship};
  localStorage.setItem('anchor_subject',JSON.stringify(S.subject));
  await loadApp();
}
async function refresh(){
  if(!S.subject)return;
  try{S.progress=await api('/subjects/'+S.subject.id+'/interviews/progress')}catch(e){}
  try{S.memories=await api('/subjects/'+S.subject.id+'/memories')}catch(e){}
  renderShell();
}
async function enterChapter(key){
  if(statusOf(key)==='completed'){toast('这一章已经存好，可以去记忆库查看整理出的片段');return}
  S.activeChapter=key;S.recorded=[];S.sessionId=null;renderChat();addTyping();
  setChatEnabled(false);
  try{
    const d=await api('/subjects/'+S.subject.id+'/interviews/'+encodeURIComponent(key)+'/start',{method:'POST'});
    S.sessionId=d.session_id;removeTyping();addMsg('ai',d.message);setChatEnabled(true);$('#chatInput').focus();
  }catch(e){removeTyping();addMsg('ai','这一章暂时打不开：'+e.message);toast(e.message)}
}
function addMsg(role,text,danger=false){
  const node=document.createElement('div');node.className='bubble '+role+(danger?' danger':'');node.textContent=text;
  $('#chatLog').appendChild(node);$('#chatLog').scrollTop=$('#chatLog').scrollHeight;
}
function addTyping(){const node=document.createElement('div');node.id='typing';node.className='bubble ai typing';node.textContent='...';$('#chatLog').appendChild(node)}
function removeTyping(){const t=$('#typing');if(t)t.remove()}
function setChatEnabled(ok){const input=$('#chatInput'),send=$('#sendBtn'),finish=$('#finishBtn');if(input)input.disabled=!ok;if(send)send.disabled=!ok;if(finish)finish.disabled=!ok}
function renderRecorded(){
  const list=$('#recordedList');if(!list)return;
  list.innerHTML=S.recorded.length?S.recorded.map(t=>`<li>${esc(short(t,52))}</li>`).join(''):'<li>这一章还没有写下片段。</li>';
}
async function sendMsg(){
  const input=$('#chatInput'), text=input?.value.trim();if(!text||S.loading||!S.sessionId)return;
  S.loading=true;setChatEnabled(false);input.value='';addMsg('user',text);S.recorded.push(text);renderRecorded();addTyping();
  try{
    const d=await api('/subjects/'+S.subject.id+'/interviews/respond',{method:'POST',body:JSON.stringify({session_id:S.sessionId,content:text})});
    removeTyping();if(d.message)addMsg('ai',d.message,d.is_danger);if(d.media_prompt)toast(d.media_prompt.text);
    if(S.activeChapter==='还有件事'){
      await refresh();
      toast('已经存进记忆库');
      setChatEnabled(false);
      S.sessionId=null;
      return;
    }
  }catch(e){removeTyping();addMsg('ai','抱歉，这次没有保存成功。可以再发一次。');toast(e.message)}
  S.loading=false;setChatEnabled(true);$('#chatInput').focus();
}
async function finishChapter(){
  if(!S.sessionId||S.loading)return;
  S.loading=true;setChatEnabled(false);
  try{await api('/subjects/'+S.subject.id+'/interviews/complete',{method:'POST',body:JSON.stringify({session_id:S.sessionId})});toast('这一章已经存好');await refresh();renderDoors()}
  catch(e){toast(e.message);setChatEnabled(true)}
  S.loading=false;
}
function openMemory(index){
  const list=S.filter==='全部'?S.memories:S.memories.filter(m=>m.chapter===S.filter);
  const m=list[index];if(!m)return;
  const overlay=document.createElement('div');overlay.className='overlay';
  overlay.innerHTML=`<div class="detail">
    <div class="section-head"><div><p class="kicker">${esc(m.chapter)}</p><h2 class="page-title" style="font-size:2rem">记忆片段</h2></div><button class="icon-btn" data-close>×</button></div>
    <p class="quote">${esc(m.raw_text)}</p>
    <div class="meta"><span class="tag">锚定潜力 ${m.anchor_potential}/10</span>${m.has_music?'<span class="tag">有音乐线索</span>':''}${m.is_procedural?'<span class="tag">日常动作</span>':''}</div>
  </div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay||e.target.hasAttribute('data-close'))overlay.remove()});
  document.body.appendChild(overlay);
}

document.addEventListener('click',async e=>{
  const action=e.target.closest('[data-action]')?.dataset.action;
  const chapter=e.target.closest('[data-chapter]')?.dataset.chapter;
  const rel=e.target.closest('[data-rel]')?.dataset.rel;
  const filter=e.target.closest('[data-filter]')?.dataset.filter;
  const mem=e.target.closest('[data-memory]')?.dataset.memory;
  if(rel){S.relationship=rel;renderRelGrid();els.relNext.classList.remove('hidden');return}
  if(chapter){enterChapter(chapter);return}
  if(filter){S.filter=filter;renderMemories();return}
  if(mem!==undefined){openMemory(Number(mem));return}
  if(action==='start'){showFull('namePage');setTimeout(()=>els.nameInput.focus(),80)}
  if(action==='restore'){try{await restoreLastSubject()}catch(err){toast(err.message)}}
  if(action==='go-rel'){S.subjectName=els.nameInput.value.trim();if(!S.subjectName)return;els.relTitle.textContent=S.subjectName+' 是你的什么人？';renderRelGrid();showFull('relPage')}
  if(action==='create-subject'){if(!S.subjectName||!S.relationship)return;els.relNext.disabled=true;try{const res=await api('/subjects',{method:'POST',body:JSON.stringify({name:S.subjectName,relationship:S.relationship})});S.subject={id:res.id,name:S.subjectName,relationship:S.relationship};localStorage.setItem('anchor_subject',JSON.stringify(S.subject));await loadApp()}catch(err){toast(err.message)}els.relNext.disabled=false}
  if(action==='home'){await refresh();renderHome()}
  if(action==='doors'){await refresh();renderDoors()}
  if(action==='memories'){await refresh();renderMemories()}
  if(action==='send')sendMsg()
  if(action==='finish')finishChapter()
  if(action==='reset'){localStorage.removeItem('anchor_subject');S.subject=null;S.progress=null;S.memories=[];els.nameInput.value='';els.nameNext.classList.add('hidden');showFull('cover')}
});
els.nameInput.addEventListener('input',()=>els.nameNext.classList.toggle('hidden',!els.nameInput.value.trim()));
els.nameInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&els.nameInput.value.trim())$('[data-action="go-rel"]').click()});
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target?.id==='chatInput'&&!e.shiftKey){e.preventDefault();sendMsg()}});

(function init(){
  if(location.search==='?reset'){localStorage.removeItem('anchor_subject');history.replaceState(null,'','/')}
  const saved=localStorage.getItem('anchor_subject');
  if(saved){try{S.subject=JSON.parse(saved);loadApp()}catch(e){showFull('cover')}}else showFull('cover');
})();
</script>
</body>
</html>
